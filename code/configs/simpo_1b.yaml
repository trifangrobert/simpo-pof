model:
  name: meta-llama/Llama-3.2-1B-Instruct

data:
  n_train: 10000
  n_test: 1000

training:
  output_dir: outputs/simpo-llama-1b
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 16       # effective batch size = 32
  learning_rate: 1.0e-6
  lr_scheduler_type: cosine
  warmup_steps: 100
  bf16: true
  gradient_checkpointing: true
  max_length: 512
  max_prompt_length: 256
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  report_to: wandb
  run_name: simpo-llama-1b

simpo:
  beta: 2.0     # temperature scaling
  gamma: 0.5    # target reward margin

wandb:
  project: simpo
  run_name: simpo-llama-1b
